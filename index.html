<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PlexDownloader</title>
<style>
  /* Brand (BrandPalette.swift): warm amber on deep indigo. Playback uses the
     STOCK CAF controls, tinted amber; only idle/loading wear our screens. */
  :root {
    --accent: rgb(245, 158, 66);
    --accent-deep: rgb(232, 94, 82);
    --deep: rgb(22, 23, 43);
  }
  html, body {
    margin: 0; width: 100%; height: 100%; overflow: hidden;
    background: var(--deep);
    font-family: -apple-system, 'SF Pro Text', Roboto, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #fff;
    cursor: none;
  }
  cast-media-player {
    --theme-hue: 28;
    --progress-color: var(--accent);
    --splash-image: none;
    --logo-image: none;
  }
  video#mse { position: absolute; inset: 0; width: 100%; height: 100%; background: #000; display: none; }

  #idle {
    position: absolute; inset: 0; display: flex;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 3.2vh;
    background:
      radial-gradient(120vw 90vh at 18% -12%, rgba(245,158,66,0.16), transparent 55%),
      radial-gradient(90vw 70vh at 88% 108%, rgba(158,120,240,0.12), transparent 60%),
      var(--deep);
  }
  #idle .mark {
    width: 13vh; height: 13vh; border-radius: 24%;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2.2vh 7vh rgba(245,158,66,0.35);
  }
  #idle .mark svg { width: 58%; height: 58%; }
  #idle .name { font-size: 4.6vh; font-weight: 700; letter-spacing: 0.01em; }
  #idle .hint { font-size: 2.5vh; color: rgba(255,255,255,0.55); font-weight: 500; }

  #loading {
    position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 3.4vh;
    background:
      radial-gradient(120vw 90vh at 18% -12%, rgba(245,158,66,0.16), transparent 55%),
      radial-gradient(90vw 70vh at 88% 108%, rgba(158,120,240,0.12), transparent 60%),
      var(--deep);
  }
  #loading .poster {
    max-height: 46vh; max-width: 60vw; border-radius: 1.6vh;
    box-shadow: 0 3vh 9vh rgba(0,0,0,0.6);
  }
  #loading .poster.empty { display: none; }
  #loading .title { font-size: 3.2vh; font-weight: 600; max-width: 80vw;
    text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  #error {
    position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    gap: 2.6vh; text-align: center;
    background:
      radial-gradient(120vw 90vh at 18% -12%, rgba(232,94,82,0.18), transparent 55%),
      radial-gradient(90vw 70vh at 88% 108%, rgba(158,120,240,0.10), transparent 60%),
      var(--deep);
  }
  #error .mark {
    width: 11vh; height: 11vh; border-radius: 24%;
    background: linear-gradient(135deg, var(--accent-deep), rgb(200, 62, 62));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2.2vh 7vh rgba(232,94,82,0.35);
  }
  #error .mark svg { width: 52%; height: 52%; }
  #error .headline { font-size: 3.6vh; font-weight: 700; max-width: 80vw; }
  #error .detail { font-size: 2.4vh; font-weight: 500;
    color: rgba(255,255,255,0.62); max-width: 70vw; line-height: 1.4; }

  .spinner {
    width: 4.6vh; height: 4.6vh; border-radius: 50%;
    border: 0.55vh solid rgba(255,255,255,0.16);
    border-top-color: var(--accent);
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<cast-media-player></cast-media-player>
<video id="mse" autoplay playsinline></video>

<div id="idle">
  <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M8 5.8c0-1.1 1.2-1.8 2.2-1.2l9.2 6.2c0.9 0.6 0.9 1.9 0 2.5l-9.2 6.2c-1 0.6-2.2-0.1-2.2-1.2V5.8z" fill="#fff"/></svg></div>
  <div class="name">PlexDownloader</div>
  <div class="hint">Select media to cast</div>
</div>

<div id="loading">
  <img class="poster empty" alt="">
  <div class="title"></div>
  <div class="spinner"></div>
</div>

<div id="error">
  <div class="mark"><svg viewBox="0 0 24 24" fill="none"><path d="M12 4.5 2.8 19a1.2 1.2 0 0 0 1 1.8h16.4a1.2 1.2 0 0 0 1-1.8L12 4.5z" stroke="#fff" stroke-width="2" stroke-linejoin="round"/><path d="M12 10v4.4" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/><circle cx="12" cy="17.4" r="1.3" fill="#fff"/></svg></div>
  <div class="headline"></div>
  <div class="detail"></div>
</div>

<script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
<script src="mp4box.all.min.js"></script>
<script src="receiver.js"></script>
</body>
</html>
